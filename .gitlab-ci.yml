image: casah347rms/ros-humble-base:latest

stages:
  - build
  - deploy

build-noetic:
  stage: build
  image:
    name: casah347rms/casah:rosx
  script:
    - echo "Building..."
    - source /opt/ros/noetic/setup.bash
    - cd ..
    - rm -rf /ros-noetic && mkdir -p /ros-noetic/src
    - cp -r fcat_msgs /ros-noetic/src
    - cd /ros-noetic
    - catkin init
    - catkin build --force-cmake

build-foxy:
  stage: build
  image:
    name: casah347rms/ros-foxy-base:latest
  script:
    - echo "Building..."
    - cd ..
    - rm -rf /ros-foxy && mkdir -p /ros-foxy/src
    - cp -r fcat_msgs /ros-foxy/src
    - cd /ros-foxy
    - colcon build --cmake-force-configure

build-humble:
  stage: build
  script:
    - echo "Building..."
    - pushd .
    - cd ..
    - rm -rf /ros-humble && mkdir -p /ros-humble/src
    - cp -r fcat_msgs /ros-humble/src
    - cd /ros-humble
    - colcon build --cmake-force-configure
    - cd install
    - tar -czf fcat_msgs.tar.gz fcat_msgs
    - popd
    - mkdir -p build
    - cp /ros-humble/install/fcat_msgs.tar.gz build/fcat_msgs-humble-amd64.tar.gz
  artifacts:
    paths: 
      - build/fcat_msgs-humble-amd64.tar.gz

deploy:
  stage: deploy
  only:
    - master
  script:
    - echo "Deploying..."
    - mkdir -p build
    - cd build
    - cmake -DBUILD=OFF ..
    - mv fcat_msgs-humble-amd64.tar.gz fcat_msgs-`cat ../version.txt`-humble-amd64.tar.gz
    - make tag
